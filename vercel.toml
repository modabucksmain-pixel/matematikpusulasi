[build]
  command = "npm install && npm run build"
  output = "dist"

[build.environment]
  NODE_VERSION = "20"

# Static pages served directly
[[redirects]]
  source = "/pages/:path*"
  destination = "/pages/:path*"
  status = 200

[[headers]]
  source = "/pages/(.*)"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  source = "/img/(.*)"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  source = "/assets/(.*)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
