<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematik Pusulası — Tam Dergi (40 Sayfa)</title>
    <meta name="description"
        content="Matematik Pusulası - 9. Sınıf Özel Sayısı. Tüm sayfaları görüntüle ve PDF olarak indir.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#050a18;--surface:rgba(10,17,40,.9);
            --accent:#6c8cff;--accent2:#a78bfa;
            --text:#b8c8e8;--text2:#6a7ea0;--white:#eef2ff;
            --border:rgba(100,140,255,.1);
        }
        html{scroll-behavior:smooth}
        body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);display:flex;overflow-x:hidden}

        /* ===== TOPBAR ===== */
        .topbar{
            position:fixed;top:0;left:0;right:0;z-index:200;height:52px;
            background:rgba(5,10,24,.85);backdrop-filter:blur(20px) saturate(1.4);
            display:flex;align-items:center;justify-content:space-between;
            padding:0 1.25rem;border-bottom:1px solid var(--border);
        }
        .topbar a{color:var(--text2);text-decoration:none;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:.4rem;transition:color .2s}
        .topbar a:hover{color:var(--white)}
        .topbar-title{font-weight:800;font-size:.95rem;color:var(--white);display:flex;align-items:center;gap:.5rem}
        .topbar-actions{display:flex;gap:.5rem}
        .topbar-btn{
            background:rgba(108,140,255,.08);border:1px solid rgba(100,140,255,.15);
            color:var(--text);border-radius:10px;padding:.35rem .75rem;cursor:pointer;
            font-size:.8rem;font-weight:600;transition:all .2s;font-family:inherit;
        }
        .topbar-btn:hover{background:rgba(108,140,255,.15);color:var(--white)}

        /* ===== PROGRESS ===== */
        .progress{position:fixed;top:52px;left:0;right:0;height:3px;background:rgba(108,140,255,.1);z-index:199}
        .progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .15s ease-out;border-radius:0 2px 2px 0}

        /* ===== SIDEBAR ===== */
        .nav-sidebar {
            position:fixed;left:0;top:55px;bottom:0;width:60px;
            background:var(--surface);backdrop-filter:blur(10px);
            overflow-y:auto;display:flex;flex-direction:column;align-items:center;
            padding:8px 0;z-index:100;border-right:1px solid var(--border);
        }
        .nav-sidebar::-webkit-scrollbar{width:4px}
        .nav-sidebar::-webkit-scrollbar-track{background:transparent}
        .nav-sidebar::-webkit-scrollbar-thumb{background:rgba(108,140,255,.2);border-radius:4px}

        .nav-btn {
            display:block;width:40px;height:40px;line-height:40px;text-align:center;
            background:rgba(108,140,255,.06);border:1px solid rgba(100,140,255,.08);
            color:var(--text2);margin-bottom:3px;text-decoration:none;
            border-radius:10px;font-size:12px;font-weight:700;
            transition:all .2s;cursor:pointer;
        }
        .nav-btn:hover{background:rgba(108,140,255,.12);color:var(--white);transform:scale(1.05)}
        .nav-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(108,140,255,.3)}
        .nav-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

        /* ===== CONTENT ===== */
        .content{
            margin-left:68px;margin-top:62px;padding:24px 16px;
            display:flex;flex-direction:column;align-items:center;
            width:calc(100% - 68px);min-height:100vh;
        }

        .page-wrapper{position:relative;margin-bottom:40px;scroll-margin-top:62px}
        .page-label{
            color:var(--text2);font-size:12px;font-weight:600;margin-bottom:6px;
            display:flex;align-items:center;gap:.5rem;
        }
        .page-label .pg-num{
            background:rgba(108,140,255,.08);color:var(--accent);padding:.15rem .45rem;
            border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
        }

        iframe{
            width:210mm;height:297mm;border:none;
            box-shadow:0 10px 40px rgba(0,0,0,.4),0 0 60px rgba(108,140,255,.03);
            background:#fff;display:block;border-radius:4px;
        }

        /* ===== RESPONSIVE ===== */
        @media screen and (max-width:768px){
            .nav-sidebar{width:48px}
            .nav-btn{width:34px;height:34px;line-height:34px;font-size:10px}
            .content{margin-left:54px;width:calc(100% - 54px);padding:16px 8px}
            iframe{width:100%;height:auto;aspect-ratio:210/297}
        }

        /* ===== PRINT ===== */
        @media print{
            .topbar,.nav-sidebar,.page-label,.progress{display:none!important}
            .content{margin:0;padding:0;width:100%}
            .page-wrapper{margin:0;page-break-after:always;break-after:page;page-break-inside:avoid}
            .page-wrapper:last-child{page-break-after:auto}
            iframe{box-shadow:none;width:210mm;height:297mm;margin:0;border-radius:0;page-break-inside:avoid}
            @page{size:A4 portrait;margin:0}
            *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
        }

        @media(prefers-reduced-motion:reduce){
            *{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
        }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <div class="topbar">
        <a href="../index.html" aria-label="Ana sayfaya dön">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            Ana Sayfa
        </a>
        <span class="topbar-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
            Matematik Pusulası
        </span>
        <div class="topbar-actions">
            <button class="topbar-btn" onclick="window.print()" aria-label="Yazdır">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                Yazdır
            </button>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

    <div class="nav-sidebar" id="nav" role="navigation" aria-label="Sayfa navigasyonu"></div>
    <div class="content" id="content"></div>

    <script>
        const totalPages = 40;
        const pageTitles = {
            1: 'Kapak', 2: 'İçindekiler', 3: 'Editörden',
            4: 'Matematik Tarihi 1', 5: 'Matematik Tarihi 2',
            6: 'Pi Sayısı', 7: 'Osmanlı Mat.', 8: 'İslam Mat.', 9: 'Euler Köprüleri',
            10: 'Cahit Arf', 11: 'El-Harezmi', 12: 'Hypatia', 13: 'Emmy Noether',
            14: 'Newton', 15: 'Turing', 16: 'Ramanujan',
            17: 'Altın Oran', 18: 'Fibonacci', 19: 'Fraktallar', 20: 'Evren & Mat.',
            21: 'AI & Matematik', 22: 'Teknoloji', 23: 'Kriptografi', 24: 'Oyun Teorisi',
            25: 'Günlük Hayat', 26: 'Spor & Mat.', 27: 'Müzik & Mat.', 28: 'Sanat & Mat.',
            29: 'Eğlenceli Gerçekler', 30: 'Mat. Sözlüğü', 31: 'Paradokslar',
            32: 'Sudoku', 33: 'Mantık Bulmaca', 34: 'Sayı Piramidi',
            35: 'Kakuro & KenKen', 36: 'Karışık Bulmaca',
            37: 'Kariyer Köşesi', 38: 'Gelecek Sayı', 39: 'Sonsöz', 40: 'Arka Kapak'
        };

        const nav = document.getElementById('nav');
        const content = document.getElementById('content');
        let currentPage = 1;

        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('a');
            btn.className = 'nav-btn';
            btn.textContent = i;
            btn.title = `Sayfa ${i}: ${pageTitles[i] || ''}`;
            btn.href = `#page-${i}`;
            btn.setAttribute('aria-label', `Sayfa ${i}: ${pageTitles[i] || ''}`);
            nav.appendChild(btn);

            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.id = `page-${i}`;

            const label = document.createElement('div');
            label.className = 'page-label';
            label.innerHTML = `<span class="pg-num">${i}</span> ${pageTitles[i] || ''}`;
            wrapper.appendChild(label);

            const iframe = document.createElement('iframe');
            iframe.src = `sayfa${i}.html`;
            iframe.loading = i <= 5 ? 'eager' : 'lazy';
            iframe.title = `Sayfa ${i}: ${pageTitles[i] || ''}`;
            wrapper.appendChild(iframe);

            content.appendChild(wrapper);
        }

        // Active page highlighting
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;
                    currentPage = parseInt(id.replace('page-', ''));
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    const btn = document.querySelector(`a[href="#${id}"]`);
                    if (btn) {
                        btn.classList.add('active');
                        btn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                    }
                }
            });
        }, { threshold: 0.3 });

        document.querySelectorAll('.page-wrapper').forEach(w => observer.observe(w));

        // Smooth scroll
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const target = document.querySelector(btn.getAttribute('href'));
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });

        // Progress bar
        const progressBar = document.getElementById('progressBar');
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            progressBar.style.width = Math.min(progress, 100) + '%';
        }, { passive: true });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                const next = Math.min(currentPage + 1, totalPages);
                document.querySelector(`#page-${next}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                const prev = Math.max(currentPage - 1, 1);
                document.querySelector(`#page-${prev}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });

        // Handle hash on load
        if (window.location.hash) {
            setTimeout(() => {
                const target = document.querySelector(window.location.hash);
                if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 500);
        }
    </script>
</body>

</html>
