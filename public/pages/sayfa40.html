<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arka Kapak — Matematik Pusulası</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        body { background: #0a0e1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 40px 0; }
        
        .page {
            width: 210mm;
            height: 297mm;
            background: #0f1a35 url('/img/math_astrolabe_back.png') center/cover no-repeat;
            position: relative;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .page::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(10, 25, 49, 0.95) 0%, rgba(10, 25, 49, 0.4) 50%, rgba(10, 25, 49, 0.95) 100%);
            z-index: 1;
        }

        .gold-frame {
            position: absolute;
            top: 15mm; left: 15mm; right: 15mm; bottom: 15mm;
            border: 2px solid rgba(201, 168, 76, 0.5);
            z-index: 2;
            pointer-events: none;
        }
        
        .gold-frame::after {
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid rgba(201, 168, 76, 0.2);
        }

        .content-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5;
            padding: 22mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }

        .top-logo {
            font-family: 'Playfair Display', serif;
            font-size: 26pt;
            font-weight: 900;
            letter-spacing: 8px;
            color: #C9A84C;
            text-transform: uppercase;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
            margin-top: 10mm;
        }
        
        .top-logo span {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 9pt;
            font-weight: 600;
            letter-spacing: 4px;
            color: rgba(250, 248, 240, 0.8);
            margin-top: 10px;
        }

        .center-quote {
            max-width: 150mm;
        }

        .center-quote p {
            font-family: 'Playfair Display', serif;
            font-size: 36pt;
            font-style: italic;
            font-weight: 700;
            color: #FAF8F0;
            line-height: 1.3;
            text-shadow: 0 5px 20px rgba(0,0,0,0.9);
            margin-bottom: 30px;
        }

        .center-quote .attr {
            font-family: 'Montserrat', sans-serif;
            font-size: 11pt;
            font-weight: 600;
            color: #C9A84C;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .bottom-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 5mm;
        }

        .qr-code {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.95);
            padding: 8px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        
        .qr-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .website {
            font-family: 'Montserrat', sans-serif;
            font-size: 11pt;
            font-weight: 600;
            color: #C9A84C;
            letter-spacing: 3px;
            text-decoration: none;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .barcode-area {
            width: 160px;
            height: 45px;
            background: repeating-linear-gradient(
                90deg,
                rgba(250, 248, 240, 0.8),
                rgba(250, 248, 240, 0.8) 2px,
                transparent 2px,
                transparent 5px,
                rgba(250, 248, 240, 0.8) 5px,
                rgba(250, 248, 240, 0.8) 7px,
                transparent 7px,
                transparent 9px
            );
            margin-top: 15px;
            border-radius: 2px;
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { margin: 0; padding: 0; background: none; display: block; }
            .page { margin: 0; box-shadow: none; page-break-after: always; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="gold-frame"></div>
        
        <div class="content-layer">
            
            <div class="top-logo">
                MATEMATİK PUSULASI
                <span>9. SINIF ÖZEL SAYISI</span>
            </div>

            <div class="center-quote">
                <p>"Matematiği seven,<br>gerçeği seven demektir."</p>
                <div class="attr">— Gottfried Wilhelm Leibniz</div>
            </div>

            <div class="bottom-section">
                <div class="qr-code">
                    <img src="/img/qr/site.png" alt="QR Code">
                </div>
                <a href="https://matematikpusulasi.vercel.app" class="website">MATEMATIKPUSULASI.VERCEL.APP</a>
                
                <div class="barcode-area"></div>
            </div>

        </div>
    </div>
</body>
</html>
