<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arka Kapak — Matematik Pusulası</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Montserrat:wght@300;400;600;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body {
            background: #0A1931;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        .page {
            width: 210mm;
            height: 297mm;
            background: #0A1931;
            padding: 0;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, #1a2d50 0%, #0A1931 60%, #050d1a 100%);
            z-index: 0;
        }

        .top-stripe {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #C9A84C, #E8D48B, #C9A84C);
            z-index: 10;
        }

        .bottom-stripe {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #C9A84C, #E8D48B, #C9A84C);
            z-index: 10;
        }

        .content {
            position: relative;
            z-index: 5;
            text-align: center;
            padding: 20mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .compass-svg {
            margin-bottom: 16px;
            filter: drop-shadow(0 0 20px rgba(201, 168, 76, 0.3));
        }

        .magazine-label {
            font-size: 8pt;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #C9A84C;
            margin-bottom: 6px;
        }

        .magazine-title {
            font-family: 'Playfair Display', serif;
            font-size: 38pt;
            font-weight: 900;
            color: #fff;
            letter-spacing: 4px;
            line-height: 1;
            margin-bottom: 3px;
        }

        .magazine-sub {
            font-size: 9pt;
            font-weight: 300;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .gold-rule {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #C9A84C, transparent);
            margin: 0 auto 16px;
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 15pt;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .tagline-sub {
            font-size: 9pt;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            margin-bottom: 24px;
        }

        .gold-rule2 {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #C9A84C, transparent);
            margin: 0 auto 20px;
        }

        .issue-badge {
            border: 1.5px solid rgba(201, 168, 76, 0.4);
            padding: 8px 24px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .issue-badge span {
            font-size: 8pt;
            letter-spacing: 4px;
            color: #C9A84C;
            text-transform: uppercase;
            font-weight: 600;
        }

        .quote-box {
            max-width: 130mm;
            padding: 14px;
            border-left: 3px solid #C9A84C;
            border-right: 3px solid #C9A84C;
            margin-bottom: 20px;
        }

        .quote-box p {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 13pt;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
            margin: 0;
        }

        .quote-box .attr {
            font-family: 'Montserrat', sans-serif;
            font-size: 8pt;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
            font-style: normal;
            letter-spacing: 1px;
        }

        .formula-row {
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0.25;
            margin-bottom: 16px;
        }

        .formula-row span {
            font-size: 11pt;
            color: #C9A84C;
            font-family: 'Playfair Display', serif;
        }

        .social {
            font-size: 8.5pt;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            body {
                margin: 0;
                padding: 0;
                background: none;
                display: block;
            }

            .page {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
            }
        }
    </style>
    <link rel="stylesheet" href="magazine-common.css">
</head>

<body>
    <div class="page">
        <div class="bg-pattern"></div>
        <div class="top-stripe"></div>
        <div class="bottom-stripe"></div>
<div class="content">
            <img src="/img/arka_kapak.png" style="width:160px; height:160px; object-fit:cover; border-radius:50%; margin-bottom:16px; box-shadow:0 0 40px rgba(201,168,76,0.3); border:3px solid rgba(201,168,76,0.4);" alt="Matematik Pusulası — Pusula Amblemi">

            <div class="magazine-label">Türkiye'nin Matematik Dergisi</div>
            <div class="magazine-title">MATEMATİK</div>
            <div class="magazine-title" style="color:#C9A84C;">PUSULASI</div>
            <div class="magazine-sub">Sayı 01 · Mart 2026</div>

            <div class="gold-rule"></div>

            <div class="tagline">Matematiğin büyüleyici dünyasına<br>hoş geldiniz.</div>
            <div class="tagline-sub">Keşfet · Öğren · Merak Et</div>

            <div class="gold-rule2"></div>

            <div class="quote-box">
                <p>"Matematiği seven, gerçeği seven demektir."</p>
<div class="attr">— Gottfried Wilhelm Leibniz</div>
            </div>

            <div class="formula-row">
                <span>π</span><span>e</span><span>φ</span><span>∞</span><span>√2</span><span>i</span><span>∑</span>
            </div>

            <div class="issue-badge"><span>Gelecek Sayı · Nisan 2026</span></div>

            <div class="social">
                🌐 <a href="https://matematikpusulasi.vercel.app" style="color:rgba(201,168,76,.7);text-decoration:none;letter-spacing:1px;">matematikpusulasi.vercel.app</a>
            </div>
        </div>
    </div>
</body>

</html>
