<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematik Pusulası — Kapak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .page {
            width: 210mm;
            height: 297mm;
            position: relative;
            background: linear-gradient(160deg, #0A1931 0%, #0d1f3c 40%, #0A1931 60%, #071428 100%);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        /* Subtle radial glow */
        .page::before {
            content: '';
            position: absolute;
            top: 35%;
            left: 50%;
            width: 500px;
            height: 500px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(201, 168, 76, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Gold border frame */
        .frame {
            position: absolute;
            top: 12mm;
            left: 12mm;
            right: 12mm;
            bottom: 12mm;
            border: 1px solid rgba(201, 168, 76, 0.25);
            pointer-events: none;
        }

        .frame::before {
            content: '';
            position: absolute;
            top: 3mm;
            left: 3mm;
            right: 3mm;
            bottom: 3mm;
            border: 0.5px solid rgba(201, 168, 76, 0.12);
        }

        /* Corner dots */
        .corner {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #C9A84C;
            border-radius: 50%;
            opacity: 0.5;
        }

        .corner-tl {
            top: -3px;
            left: -3px;
        }

        .corner-tr {
            top: -3px;
            right: -3px;
        }

        .corner-bl {
            bottom: -3px;
            left: -3px;
        }

        .corner-br {
            bottom: -3px;
            right: -3px;
        }

        /* Star field */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #C9A84C;
            border-radius: 50%;
            opacity: 0.4;
        }

        .star.bright {
            width: 3px;
            height: 3px;
            opacity: 0.7;
            box-shadow: 0 0 6px rgba(201, 168, 76, 0.6);
        }

        /* Compass */
        .compass-wrap {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 280px;
        }

        .compass-ring {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(201, 168, 76, 0.4);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 50px rgba(201, 168, 76, 0.15), inset 0 0 30px rgba(201, 168, 76, 0.08);
        }

        .compass-ring::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px solid rgba(201, 168, 76, 0.15);
            border-radius: 50%;
        }

        .compass-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: #C9A84C;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.6);
        }

        .compass-dir {
            position: absolute;
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            color: rgba(201, 168, 76, 0.6);
            letter-spacing: 2px;
        }

        .dir-n {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .dir-s {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .dir-e {
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .dir-w {
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Pi symbol glow */
        .pi {
            position: absolute;
            top: 26%;
            right: 24%;
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 900;
            color: #C9A84C;
            text-shadow: 0 0 40px rgba(201, 168, 76, 0.8), 0 0 80px rgba(201, 168, 76, 0.3);
        }

        /* Title area */
        .title-area {
            position: absolute;
            top: 55px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 5;
        }

        .title-area h1 {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 900;
            color: #C9A84C;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(201, 168, 76, 0.5), 0 3px 6px rgba(0, 0, 0, 0.6);
            line-height: 1.15;
            margin-bottom: 14px;
        }

        .title-area .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 300;
            font-style: italic;
            color: rgba(201, 168, 76, 0.8);
            letter-spacing: 3px;
        }

        /* Scattered math symbols */
        .math-sym {
            position: absolute;
            font-family: 'Playfair Display', serif;
            color: rgba(201, 168, 76, 0.12);
            font-size: 22px;
            pointer-events: none;
        }

        /* Issue info */
        .issue-bar {
            position: absolute;
            bottom: 20mm;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            color: rgba(201, 168, 76, 0.7);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .issue-bar span {
            margin: 0 12px;
        }

        /* Gold top & bottom bars */
        .gold-bar-top,
        .gold-bar-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #C9A84C, transparent);
        }

        .gold-bar-top {
            top: 0;
        }

        .gold-bar-bottom {
            bottom: 0;
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            body {
                margin: 0;
                padding: 0;
                background: none;
                display: block;
            }

            .page {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="gold-bar-top"></div>
        <div class="gold-bar-bottom"></div>

        <!-- Frame -->
        <div class="frame">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
        </div>

        <!-- Stars -->
        <div class="stars">
            <div class="star" style="top:8%;left:15%"></div>
            <div class="star bright" style="top:18%;left:75%"></div>
            <div class="star" style="top:30%;left:8%"></div>
            <div class="star" style="top:42%;left:88%"></div>
            <div class="star bright" style="top:55%;left:12%"></div>
            <div class="star" style="top:68%;left:82%"></div>
            <div class="star" style="top:78%;left:22%"></div>
            <div class="star bright" style="top:85%;left:68%"></div>
            <div class="star" style="top:25%;left:45%"></div>
            <div class="star" style="top:62%;left:55%"></div>
            <div class="star" style="top:15%;left:55%"></div>
            <div class="star" style="top:90%;left:40%"></div>
        </div>

        <!-- Title -->
        <div class="title-area">
            <h1>MATEMATİĞİN<br>PUSULASI</h1>
            <div class="subtitle">9. Sınıf Özel Sayısı</div>
        </div>

        <!-- Compass -->
        <div class="compass-wrap">
            <div class="compass-ring">
                <div class="compass-dir dir-n">K</div>
                <div class="compass-dir dir-s">G</div>
                <div class="compass-dir dir-e">D</div>
                <div class="compass-dir dir-w">B</div>
                <div class="compass-center"></div>
            </div>
        </div>

        <!-- Pi -->
        <div class="pi">π</div>

        <!-- Math symbols -->
        <div class="math-sym" style="top:10%;left:6%;transform:rotate(15deg)">∞</div>
        <div class="math-sym" style="top:88%;left:85%;transform:rotate(-20deg)">∑</div>
        <div class="math-sym" style="bottom:14%;left:10%;transform:rotate(40deg)">∫</div>
        <div class="math-sym" style="top:16%;right:8%;transform:rotate(-30deg)">√</div>
        <div class="math-sym" style="top:72%;left:6%;transform:rotate(10deg)">Δ</div>
        <div class="math-sym" style="top:50%;right:6%;transform:rotate(-15deg)">θ</div>

        <!-- Issue info -->
        <div class="issue-bar">
            <span>Sayı 1</span>
            <span>•</span>
            <span>Mart 2026</span>
        </div>
    </div>
</body>

</html>
